<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 全链路流程图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .container { max-width: 1150px; width: 100%; }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2035" stroke-width="0.5"/>
    </pattern>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#1e293b"/>
    </pattern>

    <!-- Arrowheads -->
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>

    <!-- Glow filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-emerald" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-violet" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for boxes -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="560" fill="#0a0e17"/>
  <rect width="1100" height="560" fill="url(#grid)"/>

  <!-- ============================================ -->
  <!-- TITLE                                         -->
  <!-- ============================================ -->
  <text x="550" y="35" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">
    RAG 全链路流程图
  </text>
  <text x="550" y="55" fill="#64748b" font-size="11" text-anchor="middle">
    Retrieval-Augmented Generation — 检索增强生成
  </text>

  <!-- ============================================ -->
  <!-- PHASE 1 BOUNDARY (入库 / Indexing)             -->
  <!-- ============================================ -->
  <rect x="25" y="72" width="1050" height="175" rx="10" fill="rgba(6,78,59,0.06)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="25" y="72" width="160" height="26" rx="10" fill="#065f46"/>
  <text x="105" y="89" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">阶段一：入库 Indexing</text>
  <text x="1080" y="89" fill="#64748b" font-size="9" text-anchor="end">发生在用户提问之前</text>

  <!-- === Row 1 boxes === -->
  <!-- Box 1: 原始文档 -->
  <g filter="url(#shadow)">
    <rect x="44" y="115" width="130" height="66" rx="8" fill="#0f172a"/>
    <rect x="44" y="115" width="130" height="66" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
    <text x="109" y="143" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">📄 原始文档</text>
    <text x="109" y="165" fill="#94a3b8" font-size="10" text-anchor="middle">PDF / DOCX / MD</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="174" y1="148" x2="214" y2="148" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <text x="194" y="140" fill="#34d399" font-size="8" text-anchor="middle">读取</text>

  <!-- Box 2: 文档解析 -->
  <g filter="url(#shadow)">
    <rect x="223" y="115" width="130" height="66" rx="8" fill="#0f172a"/>
    <rect x="223" y="115" width="130" height="66" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
    <text x="288" y="143" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">🔍 文档解析</text>
    <text x="288" y="165" fill="#94a3b8" font-size="10" text-anchor="middle">提取纯文本</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="353" y1="148" x2="393" y2="148" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <text x="373" y="140" fill="#34d399" font-size="8" text-anchor="middle">切分</text>

  <!-- Box 3: 文本分块 -->
  <g filter="url(#shadow)">
    <rect x="402" y="115" width="150" height="66" rx="8" fill="#0f172a"/>
    <rect x="402" y="115" width="150" height="66" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="477" y="140" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">✂️ 文本分块</text>
    <text x="477" y="156" fill="#f1f5f9" font-size="9" text-anchor="middle">chunk_size / overlap</text>
    <text x="477" y="170" fill="#94a3b8" font-size="9" text-anchor="middle">→ 每个块 = 一个 Node</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="552" y1="148" x2="592" y2="148" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <text x="572" y="140" fill="#34d399" font-size="8" text-anchor="middle">编码</text>

  <!-- Box 4: Embedding -->
  <g filter="url(#shadow)">
    <rect x="601" y="115" width="150" height="66" rx="8" fill="#0f172a"/>
    <rect x="601" y="115" width="150" height="66" rx="8" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="676" y="140" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">🧮 Embedding</text>
    <text x="676" y="156" fill="#f1f5f9" font-size="9" text-anchor="middle">文字 → 向量坐标</text>
    <text x="676" y="170" fill="#94a3b8" font-size="9" text-anchor="middle">1536 维数字列表</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="751" y1="148" x2="791" y2="148" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrow-violet)"/>
  <text x="771" y="140" fill="#a78bfa" font-size="8" text-anchor="middle">写入</text>

  <!-- Box 5: 向量数据库 -->
  <g filter="url(#shadow)">
    <!-- Cylinder shape -->
    <rect x="800" y="125" width="150" height="48" fill="#0f172a"/>
    <ellipse cx="875" cy="125" rx="75" ry="12" fill="#0f172a"/>
    <ellipse cx="875" cy="173" rx="75" ry="12" fill="#0f172a"/>
    <rect x="800" y="125" width="150" height="48" fill="rgba(76,29,149,0.3)"/>
    <ellipse cx="875" cy="125" rx="75" ry="12" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="875" cy="173" rx="75" ry="12" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="800" y1="125" x2="800" y2="173" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="950" y1="125" x2="950" y2="173" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="875" y="146" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">🗄️ 向量数据库</text>
    <text x="875" y="163" fill="#94a3b8" font-size="9" text-anchor="middle">Index · HNSW 索引</text>
  </g>

  <!-- ============================================ -->
  <!-- BRIDGE between phases                         -->
  <!-- ============================================ -->
  <!-- Dashed connection from Index down to Phase 2 -->
  <path d="M 875 185 L 875 270 L 676 270 L 676 290" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="875" cy="185" r="3" fill="#64748b"/>
  <text x="790" y="265" fill="#64748b" font-size="9" text-anchor="middle">向量库已就绪，等待查询</text>

  <!-- ============================================ -->
  <!-- PHASE 2 BOUNDARY (问答 / Querying)            -->
  <!-- ============================================ -->
  <rect x="25" y="298" width="1050" height="175" rx="10" fill="rgba(8,51,68,0.06)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="25" y="298" width="160" height="26" rx="10" fill="#0e3a4d"/>
  <text x="105" y="315" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">阶段二：问答 Querying</text>
  <text x="1080" y="315" fill="#64748b" font-size="9" text-anchor="end">用户提问时触发</text>

  <!-- === Row 2 boxes === -->
  <!-- Box 1: 用户提问 -->
  <g filter="url(#shadow)">
    <rect x="44" y="341" width="130" height="66" rx="8" fill="#0f172a"/>
    <rect x="44" y="341" width="130" height="66" rx="8" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="109" y="369" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">🙋 用户提问</text>
    <text x="109" y="391" fill="#94a3b8" font-size="10" text-anchor="middle">自然语言问题</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="174" y1="374" x2="214" y2="374" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrow-cyan)"/>
  <text x="194" y="366" fill="#22d3ee" font-size="8" text-anchor="middle">编码</text>

  <!-- Box 2: Embedding (问题) -->
  <g filter="url(#shadow)">
    <rect x="223" y="341" width="130" height="66" rx="8" fill="#0f172a"/>
    <rect x="223" y="341" width="130" height="66" rx="8" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="288" y="366" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">🧮 Embedding</text>
    <text x="288" y="382" fill="#f1f5f9" font-size="9" text-anchor="middle">问题 → 向量</text>
    <text x="288" y="397" fill="#94a3b8" font-size="9" text-anchor="middle">同一 Embedding 模型</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="353" y1="374" x2="393" y2="374" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrow-cyan)"/>
  <text x="373" y="366" fill="#22d3ee" font-size="8" text-anchor="middle">查询</text>

  <!-- Box 3: Retriever -->
  <g filter="url(#shadow)">
    <rect x="402" y="341" width="150" height="66" rx="8" fill="#0f172a"/>
    <rect x="402" y="341" width="150" height="66" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow-cyan)"/>
    <text x="477" y="366" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">🎯 Retriever</text>
    <text x="477" y="382" fill="#f1f5f9" font-size="9" text-anchor="middle">向量相似度检索</text>
    <text x="477" y="397" fill="#94a3b8" font-size="9" text-anchor="middle">余弦相似度 / Top-K</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="552" y1="374" x2="592" y2="374" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrow-cyan)"/>
  <text x="572" y="366" fill="#22d3ee" font-size="8" text-anchor="middle">返回</text>

  <!-- Box 4: 检索结果 -->
  <g filter="url(#shadow)">
    <rect x="601" y="341" width="130" height="66" rx="8" fill="#0f172a"/>
    <rect x="601" y="341" width="130" height="66" rx="8" fill="rgba(8,51,68,0.2)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="666" y="369" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">📋 检索结果</text>
    <text x="666" y="391" fill="#94a3b8" font-size="10" text-anchor="middle">Top-K Nodes + 分数</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="731" y1="374" x2="771" y2="374" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-slate)"/>
  <text x="751" y="366" fill="#60a5fa" font-size="8" text-anchor="middle">拼接</text>

  <!-- Box 5: 拼接 Prompt -->
  <g filter="url(#shadow)">
    <rect x="780" y="341" width="130" height="66" rx="8" fill="#0f172a"/>
    <rect x="780" y="341" width="130" height="66" rx="8" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
    <text x="845" y="366" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">🔗 拼接 Prompt</text>
    <text x="845" y="382" fill="#f1f5f9" font-size="9" text-anchor="middle">Augment 阶段</text>
    <text x="845" y="397" fill="#94a3b8" font-size="9" text-anchor="middle">资料 + 问题 → 模板</text>
  </g>

  <!-- Arrow 5→6 -->
  <line x1="910" y1="374" x2="938" y2="374" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-amber)"/>
  <text x="924" y="366" fill="#fb923c" font-size="8" text-anchor="middle">调用</text>

  <!-- Box 6: QueryEngine / LLM -->
  <g filter="url(#shadow)">
    <rect x="947" y="334" width="115" height="80" rx="8" fill="#0f172a"/>
    <rect x="947" y="334" width="115" height="80" rx="8" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow-amber)"/>
    <text x="1004" y="360" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">🤖 LLM</text>
    <text x="1004" y="378" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">QueryEngine</text>
    <text x="1004" y="395" fill="#94a3b8" font-size="9" text-anchor="middle">生成答案</text>
    <text x="1004" y="409" fill="#64748b" font-size="8" text-anchor="middle">Generation</text>
  </g>

  <!-- Answer arrow going right-then-down (detour to avoid overlap) -->
  <path d="M 1062 374 L 1080 374 L 1080 510 L 543 510 L 543 490" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)" stroke-dasharray="0"/>

  <!-- ============================================ -->
  <!-- FINAL ANSWER (centered below)                 -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="393" y="492" width="300" height="52" rx="25" fill="#0f172a"/>
    <rect x="393" y="492" width="300" height="52" rx="25" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="2"/>
    <text x="543" y="514" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">✅ 最终答案（带引用来源）</text>
    <text x="543" y="532" fill="#94a3b8" font-size="10" text-anchor="middle">"根据《员工手册》第3.2条 [1]，报销流程为…"</text>
  </g>

  <!-- ============================================ -->
  <!-- LEGEND                                        -->
  <!-- ============================================ -->
  <g transform="translate(28, 496)">
    <rect x="0" y="0" width="330" height="52" rx="6" fill="rgba(15,23,42,0.8)" stroke="#1e293b" stroke-width="1"/>
    <text x="10" y="18" fill="#94a3b8" font-size="9" font-weight="600">图例</text>

    <rect x="10" y="26" width="12" height="8" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
    <text x="26" y="34" fill="#94a3b8" font-size="8">入库阶段</text>

    <rect x="80" y="26" width="12" height="8" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="96" y="34" fill="#94a3b8" font-size="8">问答阶段</text>

    <rect x="150" y="26" width="12" height="8" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="166" y="34" fill="#94a3b8" font-size="8">Embedding</text>

    <rect x="225" y="26" width="12" height="8" rx="2" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
    <text x="241" y="34" fill="#94a3b8" font-size="8">LLM 生成</text>

    <line x1="295" y1="30" x2="315" y2="30" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="320" y="34" fill="#94a3b8" font-size="8">数据流</text>
  </g>

  <!-- ============================================ -->
  <!-- ANNOTATION: "共享同一模型"                     -->
  <!-- ============================================ -->
  <path d="M 676 181 L 676 280 L 288 280 L 288 332" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="676" cy="181" r="2" fill="#a78bfa" opacity="0.5"/>
  <text x="482" y="275" fill="#a78bfa" font-size="8" text-anchor="middle" opacity="0.5">入库 &amp; 问答使用同一个 Embedding 模型</text>
</svg>
</div>
</body>
</html>
