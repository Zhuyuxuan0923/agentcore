<script id="md-content" type="text/markdown"># 16周 AI Agent 工程师养成计划

> **适用人群**：有 Python 基础、会用 Git、做过几个 Agent Demo 的在校生/应届生
> **投入**：每天 4-6 小时，每周 6 天（周日轻量复盘）
> **目标岗位**：AI Agent 开发工程师 / AI 应用工程师，薪资 15K-25K
> **核心策略**：作品驱动 + 证书补位 + 第 10 周开始投递

---

## 1. 总体路线图

| 阶段 | 周次 | 核心目标 | 阶段产出物 | 投递策略 |
|------|------|----------|------------|----------|
| **阶段一：基础夯实** | W1-W4 | 从"会用 API"到"能独立交付 RAG 应用" | 作品1：个人知识库问答 Agent | ❌ 不投，积累弹药 |
| **阶段二：深度构建** | W5-W8 | 掌握多 Agent 协作与工具编排 | 作品2：多 Agent 代码审查系统 | ❌ 不投，但开始整理简历素材 |
| **阶段三：工程化** | W9-W12 | 从 Demo 到生产级应用 | 作品3：自动化工作流 Agent | ⚠️ **W10 开始投递**，作品 3 骨架完成后再投 |
| **阶段四：企业级冲刺** | W13-W16 | 补齐安全/合规/性能短板，拿 Offer | 作品4：企业级安全合规 Agent | ✅ 全力投递+面试，用全部 4 个作品 |

### 为什么是这个节奏

- **W1-W8 不投**：作品不够硬，面试通过率低，浪费时间且打击信心
- **W10 开始投**：此时作品 3 的骨架已完成（W9），简历有 2.5 个完整作品支撑，不会出现"简历写得花但 Demo 拿不出来"的尴尬
- **W13-W16 面试期**：边面试边做作品 4，面试中可以聊"正在做的项目"，展示学习能力

---

### AI 助手分工说明

每项任务标注了分工模式，最大化效率的同时确保你真正掌握核心技术：

| 标记 | 含义 | 典型场景 |
|------|------|----------|
| **✍️你编码** | 你独立完成核心逻辑 | 后端 API、工具函数、架构设计——这些你必须能向面试官解释 |
| **🤖AI生成** | AI 生成样板/模板/用例 | 前端组件骨架、测试用例、README 文档、CI 配置——速度快但需审核 |
| **🤖骨架 ✍️核心** | AI 搭架子，你写关键代码 | 编排器、工作流引擎——AI 不知道你的设计意图，核心逻辑必须自己写 |
| **✍️你复盘** | 你独立总结+输出文章 | 每周复盘、技术文章——写作帮你理清思路，面���时表述更清晰 |
| **🤖✍️混合** | 人机协同 | AI 生成初版 → 你修改优化 → AI 润色 → 你终审 |

> **核心原则**：AI 生成的代码你必须读懂。面试官问"这个函数你自己写的吗？"时，你能说"是我写的，AI 帮我加速了重复部分"——而不是"AI 写的，我改了改 bug"。

---

## 2. 周度拆解

### 阶段一：基础夯实（W1-W4）

#### Week 1：Python 工程化 + LLM API 深度掌握

| 项目 | 内容 |
|------|------|
| **本周目标** | 能用 FastAPI + Pydantic 写出生产级 API，熟练掌握 3 家以上 LLM API 的错误处理与重试机制 |

**每日任务**

| 天 | 任务 | 分工 | 预计耗时 |
|----|------|------|----------|
| Day 1 | 搭建开发环境：VS Code 配置（Black/MyPy/Ruff）、poetry 管理依赖、pre-commit 配置。让 CC 生成 `.pre-commit-config.yaml` 骨架，你重点改 hooks 列表 | 🤖AI骨架 ✍️你配置 | 4h |
| Day 2 | FastAPI 速通：写一个 `/chat` 端点，Pydantic v2 做请求校验，StreamingResponse 实现 SSE 流式输出。**关键**：用 `httpx` 替代 `requests`，后面全用异步 | ✍️你编码 | 5h |
| Day 3 | OpenAI SDK 深度使用：system prompt 管理、temperature/top_p 调参实验、token 计数（tiktoken）、function calling 基础。写一个脚本批量测试 20 条 prompt 并记录 token 消耗 | ✍️你编码 | 5h |
| Day 4 | Anthropic SDK + 国产模型：Claude API 的 system message 与 OpenAI 的区别、GLM-4/DeepSeek API 接入。封装一个统一的 `LLMClient` 类，支持 3 家以上 provider 切换 | ✍️你编码 | 6h |
| Day 5 | 错误处理与重试：实现 exponential backoff、rate limit 处理、stream 中断恢复。用 `tenacity` 库。写单元测试覆盖所有异常分支 | 🤖AI生成测试 ✍️你写逻辑 | 6h |
| Day 6 | 集成：把 Day 2-5 的内容整合成一个 `agent-core` 包，包含 config/llm/tools 三个模块。写 README 和 docstring | ✍️你整合 🤖AI写README | 6h |
| Day 7 | 周复盘：整理本周踩坑笔记，发一篇知乎/掘金文章《LLM API 调用踩坑指南》。文章就是你的学习笔记，不用写多好 | ✍️你复盘 🤖AI润色文章 | 3h |

**本周产出**
- ✅ `agent-core` Python 包（GitHub 仓库，含 README + 单元测试）
- ✅ 一篇技术博文
- ✅ 本地可运行的 `/chat` SSE 端点

**检验标准**
- 🟡 能在 3 分钟内用自己封装的 client 切换 Anthropic → DeepSeek，不报错
- 🟡 流式输出中断后能自动重连恢复，不丢数据
- 🟡 单元测试覆盖率 > 80%

**避坑提示**
- ❌ **别碰 LangChain**：这周的目标是理解底层，LangChain 的抽象层会阻碍你理解 API 细节
- ❌ **别纠结异步原理**：会用 `async/await` 就行，别花 3 小时看 asyncio 源码
- ❌ **别追求完美封装**：`LLMClient` 能用就行，后面会重构

---

#### Week 2：Prompt Engineering + 结构化输出

| 项目 | 内容 |
|------|------|
| **本周目标** | 掌握 Prompt 工程方法论，能稳定控制 LLM 输出 JSON/结构化数据，理解并实现 Tool Use 循环 |

**每日任务**

| 天 | 任务 | 分工 | 预计耗时 |
|----|------|------|----------|
| Day 1 | Prompt 工程理论：精读 Anthropic 的 Prompt Engineering Guide + OpenAI Cookbook 的 prompt 相关章节。整理 10 条最核心的原则到自己的 Notion/飞书 | ✍️你阅读 | 4h |
| Day 2 | Prompt 模板系统：用 Jinja2 实现可变 prompt 模板，支持 few-shot 示例动态注入。让 CC 生成模板引擎骨架，你重点设计模板变量和作用域 | 🤖AI骨架 ✍️你设计 | 5h |
| Day 3 | 结构化输出（JSON Mode + Tool Calling）：分别用 OpenAI JSON mode、Claude tool use、GLM-4 的 function call 实现同样的结构化提取任务，对比成功率 | ✍️你编码 | 6h |
| Day 4 | Tool Use 深入：实现一个完整的 tool calling 循环——LLM 决定调用哪个工具 → 执行 → 把结果喂回 LLM → 继续决策。最多循环 5 轮 | ✍️你编码 | 6h |
| Day 5 | Prompt 评测：写一个评测脚本，用 50 条测试用例对比 3 种 prompt 写法的准确率。输出评测报告（markdown 表格） | 🤖AI生成用例 ✍️你写框架 | 6h |
| Day 6 | System Prompt 设计实战：给你的 Agent 写 3 个版本的 system prompt，用 Day 5 的评测框架跑分。**关键**：prompt 里要有角色、约束、输出格式、few-shot 示例 | ✍️你设计 🤖AI评测得 | 5h |
| Day 7 | 周复盘：整理 prompt 模板库到 GitHub。本周文章《写好 System Prompt 的 10 条法则》 | ✍️你复盘 🤖AI润色 | 3h |

**本周产出**
- ✅ `prompt-templates` 仓库（含 10+ 可复用模板 + 评测框架）
- ✅ System Prompt 设计方法论笔记
- ✅ 结构化输出对比评测报告

**检验标准**
- 🟡 同一个任务用 3 种 prompt 写法，最好和最差准确率差 < 15%
- 🟡 Tool calling 循环能稳定在 3 轮内完成一个多步骤任务（如"先搜索再总结再翻译"）
- 🟡 结构化输出成功率 > 90%（50 条测试）

**避坑提示**
- ❌ **别只看不练**：prompt engineering 是手艺活，每天至少写 10 条 prompt
- ❌ **别追求复杂 prompt**：一个好的 system prompt 通常在 200-500 字，不是 2000 字
- ❌ **别忽略国产模型**：面试大概率会问"国产模型和 GPT 在 prompt 上有什么区别"

---

#### Week 3：RAG 基础 + 向量数据库

| 项目 | 内容 |
|------|------|
| **本周目标** | 理解 RAG 全链路，能用 LangChain/LlamaIndex 搭建可用的文档问答系统 |

**每日任务**

| 天 | 任务 | 分工 | 预计耗时 |
|----|------|------|----------|
| Day 1 | RAG 理论：精读 LlamaIndex 官方文档的 Concepts 章节（Embedding、Node、Index、Retriever、QueryEngine）。画一张 RAG 全链路流程图 | ✍️你阅读 | 5h |
| Day 2 | 文档处理管道：实现 PDF/Word/Markdown 解析 → 文本分块（Chunking）→ Embedding。对比 3 种分块策略（固定大小、语义分块、递归分块）。让 CC 生成分块器骨架，你重点调 chunk_size 和 overlap | 🤖AI骨架 ✍️你调参 | 6h |

**每日任务**

**MCP vs A2A 速查表**

| 维度 | MCP（Model Context Protocol） | A2A（Agent-to-Agent） |
|------|------|------|
| **提出方** | Anthropic | Google |
| **核心问题** | 模型如何发现和调用外部工具/资源 | Agent 之间如何发现、协作和委托任务 |
| **通信模式** | Client-Server（工具/资源提供者） | Peer-to-Peer（Agent 平等协作） |
| **关键概念** | Tool、Resource、Prompt、Server | Agent Card、Task、Message、Artifact |
| **类比** | LLM 的"USB 协议"——统一工具接口 | Agent 的"HTTP + REST"——统一通信协议 |
| **适用场景** | 单个 Agent 访问外部系统（数据库、API、文件） | 多 Agent 系统协作（交叉验证、分工委托、链式调用） |
| **学习重点** | 写一个 MCP Server 并让 Claude Code 调用 | 理解 Agent Card 和 Task 生命周期，实现 A2A 协作 Demo |
| **面试话题** | "MCP 和 Function Calling 是什么关系？" | "多 Agent 通信为什么不用 MCP？A2A 解决了什么 MCP 解决不了的问题？" |

**本周产出**
- ✅ `mcp-toolkit` 仓库（含 MCP Server/Client + 5+ 个工具）
- ✅ `a2a-playground` 仓库（含 A2A Server/Client + 2-Agent 协作 Demo）
- ✅ 《MCP vs A2A 协议选型指南》文档
- ✅ "每日晨报"自动化工作流

**检验标准**
- 🟡 工作流编辑器能拖拽创建节点、连线、设置条件、触发执行
- 🟡 MCP Server 能同时被 Claude Code 和自己的 Client 调用
- 🟡 两个 Agent 通过 A2A 协议完成一次协作任务（Agent A 委托 Agent B 查资料并返回结果）
- 🟡 能清晰回答"MCP 和 A2A 分别解决什么问题？什么场景用哪个？"

**避坑提示**
- ❌ **别用 Temporal 做个人项目**：学习成本高，用 Prefect 或自研轻量方案
- ❌ **MCP Server 别暴露敏感操作**：SearchWeb 要限制 URL 范围，SendEmail 要确认
- ❌ **A2A 别做太重**：理解协议思想和核心概念就行，别试图实现完整的 A2A 规范——Google 官方 SDK 还在快速迭代

## 3. 证书穿插计划

> **原则**：证书是补位策略，不是核心。不考"计算机二级"类基础证书——面试官不关注，投入产出比极低。聚焦云平台认证（直接关联部署能力）和软考（体制内/国企加分，但延后到入职后考）。

| 证书 | 时间 | 报名方式 | 费用 | 备考策略 | 性价比 |
|------|------|----------|------|----------|--------|
| **阿里云 ACA 云计算** | W6-W7 备考，W10-W11 考试 | 阿里云认证官网 / 学生免费券 | 0-600 元（用学生免费额度） | Udemy/ACloudGuru 课程 10h + 题库 5h | ⭐⭐⭐⭐ 云部署能力证明，和作品关联度高 |
| **AWS Cloud Practitioner** | 替代选项，W6-W7 备考 | AWS 官网 / 学生免费券 | 0-100 USD（学生优惠） | AWS Skill Builder 免费课程 6h + Udemy 题库 4h | ⭐⭐⭐⭐ 国际认可度更高，外企/远程加分 |
| **软考中级 软件设计师** | 🚫 入职后再考，非面试期 | [软考官网](https://www.ruankao.org.cn) | ~200 元 | 历年真题 5 套 + 《软件设计师教程》，备考 30h | ⭐⭐⭐⭐⭐ 体制内/国企加分，学历弱时补位 |

> **阿里云 ACA vs AWS Cloud Practitioner**：二选一即可。如果目标公司用阿里云（国内主流），选 ACA；如果瞄准外企/远程/出海公司，选 AWS。别两个都考，浪费时间。
>
> **软考为什么延后**：W13-W16 是面试密集期，软考需要 30h+ 备考，会和面试准备冲突。入职后利用试用期碎片时间考，不急。

## 4. 作品集规划

### 作品1：个人知识库问答 Agent

| 维度 | 详情 |
|------|------|
| **时间** | W3 积累技术，W4 集中开发 |
| **定位** | "能看懂你的文档并精准回答的 AI 助手" |
| **技术栈** | FastAPI（后端）+ Next.js + shadcn/ui（前端）+ ChromaDB/Milvus Lite（向量库）+ OpenAI/DeepSeek Embedding + SQLite（会话存储）+ Docker |
| **核心特性** | 多文件上传(PDF/DOCX/MD)、分块策略可视化对比、带引用的答案、多知识库切换、对话历史 |
| **架构描述** | 用户上传文件 → 后端解析并分块 → Embedding 模型向量化 → 存入向量数据库。用户提问 → 问题向量化 → 向量检索 Top-K → 拼接 Prompt → LLM 生成 → 答案 + 引用返回前端渲染 |
| **Prompt 设计** | System Prompt 用中文，明确角色（"你是一个知识库助手，只根据提供的文档内容回答问题"）、约束（"如果文档中没有相关信息，直接说'未找到相关内容'"）、输出格式要求（"在答案中用 [1] [2] 标注引用来源"） |
| **部署方案** | 前端 Vercel（免费）+ 后端 Fly.io/Render（免费额度，Railway 已取消免费层勿用）+ 向量库 Milvus Lite（嵌入后端进程）|

### 作品2：多 Agent 协作的代码审查系统

| 维度 | 详情 |
|------|------|
| **时间** | W7 积累技术，W8 集中开发 |
| **定位** | "用多个 AI Agent 模拟专业代码审查团队的自动化工具" |
| **技术栈** | FastAPI + LangGraph（Agent 编排）+ GitHub API + Redis（消息队列）+ PostgreSQL（审查记录）+ Next.js（报告展示）+ Docker Compose |
| **核心特性** | GitHub PR Webhook 自动触发、3 个 Agent 分工协作（Reviewer/Researcher/Reporter）、结构化审查报告（问题分级+代码定位）、PR 评论自动回写、审查历史趋势图 |
| **架构描述** | GitHub Webhook → Orchestrator 解析 PR → 并发派发给 3 个 Agent（Reviewer 逐行审查 Diff → Researcher 检索相关文档和最佳实践 → Reporter 汇总并撰写报告）→ Orchestrator 合并报告 → 回写 PR Comment + 存储到 PostgreSQL |
| **Prompt 设计** | 3 个 Agent 各有一套 System Prompt——Reviewer（"你是资深代码审查员，关注安全漏洞、逻辑错误、性能问题"）、Researcher（"你负责检索相关技术文档和最佳实践，为 Reviewer 提供参考"）、Reporter（"你将审查意见和研究成果整合为结构清晰、可操作的审查报告"） |
| **部署方案** | 后端 Fly.io/Render + GitHub App（接收 Webhook）+ Redis Cloud 免费层 + Vercel（前端）。也可用阿里云学生免费 ECS |

### 作品3：自动化工作流 Agent

| 维度 | 详情 |
|------|------|
| **时间** | W11 积累技术，W12 集中开发 |
| **定位** | "拖拽式 AI 工作流平台，让 Agent 帮你自动完成重复性任务" |
| **技术栈** | FastAPI + React Flow（可视化编辑器）+ Celery/Redis（任务队列）+ MCP 协议（工具集成）+ A2A 协议（Agent 间协作）+ PostgreSQL + Docker Compose |
| **核心特性** | 可视化工作流编辑（拖拽节点+连线）、10 个内置模板、MCP 工具热插拔、A2A Agent 节点协作、Cron/Webhook 触发、执行历史与重试、通知集成 |
| **架构描述** | 用户在画布拖拽节点构建工作流 → 保存为 DAG JSON → 触发器(Cron/Webhook/手动)启动 → Engine 解析 DAG → 按依赖关系执行节点 → 每个节点调用 LLM 或 MCP 工具 → 结果沿 DAG 传递 → 最终节点汇总输出 → 通知用户 |
| **Prompt 设计** | 动态 Prompt 生成——每个工作流节点根据其在 DAG 中的位置和前序节点的输出，动态构建 Prompt。例如"总结节点"会根据"信息收集节点"的输出自动填充 `{context}` 变量 |
| **部署方案** | 全部通过 Docker Compose 部署到阿里云免费 ECS（学生认证领 1 个月免费）+ 本地也可运行 |

### 作品4：企业级安全合规 Agent

| 维度 | 详情 |
|------|------|
| **时间** | W15 积累技术，W16 集中开发 |
| **定位** | "帮企业自动检查隐私政策合规性的 AI 审计工具" |
| **技术栈** | FastAPI + 多租户 Row-level 隔离 + Casbin（权限）+ Guardrails-AI（安全）+ 阿里云内容安全 API + PostgreSQL + Redis + Next.js + Docker Compose |
| **核心特性** | 隐私政策文件上传解析、法规知识库 RAG、合规差距分析、整改建议生成、评分雷达图、多租户数据隔离、操作审计日志、IP 白名单 |
| **架构描述** | 企业用户上传隐私政策 PDF → 文档解析→条款提取→向量检索相关法规（《个人信息保护法》/GDPR）→ Agent 对比分析"政策条款 vs 法规要求"→生成合规评分+差距报告+整改建议→输出到仪表盘。全过程经 Guardrails 输入检测+输出审核+审计记录 |
| **Prompt 设计** | 合规分析 Agent 的 System Prompt 需要极高的精确性——"你是数据合规审计专家，严格按照法规原文比对，不要添加主观判断"。输出格式为结构化 JSON，包含"法规条款/政策条款/符合度/差距描述/整改建议"五个字段 |
| **部署方案** | Docker Compose 完整部署 + 使用阿里云学生免费额度 + mock 内容审核 API（如果没预算） |

```

AI Agent Developer | 4 个开源项目 | 16 周持续交付

- 🔍 [多 Agent 代码审查系统](链接) — 3 Agent 协作，GitHub PR 自动触发
- ⚡ [AI 工作流自动化平台](链接) — 拖拽式编辑器，MCP/A2A 工具编排
- 🛡️ [企业安全合规 Agent](链接) — 多租户 + 审计 + 合规分析

### 🛠 Stack

### 📝 Writing

```

**3 个关键动作（每个仓库 5 分钟搞定）**

| 动作 | 怎么做 | 为什么重要 |
|------|--------|------------|
| **README 放 GIF** | 用 ScreenToGif/LICEcap 录 15 秒核心功能 → 放到 README 顶部 | 视觉冲击 >> 文字描述，面试官不想读 README |
| **在线 Demo 链接** | README 最上方放坏链检测→可点击的 Demo URL | 面试官能秒开体验，比"代码在这里"强 10 倍 |
| **技术标签** | 仓库 Topics 加 `ai-agent` `rag` `llm` `mcp` `fastapi` | GitHub 的 Topics 搜索会给你带来额外曝光 |

**绿点墙作弊码**

连续提交是面试中的加分项——证明你能持续产出。如果某天没写代码，用以下方式保持绿点：
- 更新 README / 写技术文档 / 整理笔记到 GitHub Issues
- 用 AI 生成一篇 500 字技术短文推到 GitHub Pages
- 最差情况：`git commit --allow-empty -m "docs: weekly review notes"`

> **时间点**：W4 末（作品1 上线后）就开始装饰 Profile，不要等到 W16。Profile 是逐步生长的，不是一次性装修。

## 6. 面试准备模块：用 AI 生成面经 + 模拟面试

> **启动时机**：W10 投递第一波简历后立即启动。不要等到收到面试通知才准备——提前 1-2 周准备面经，面试通过率提升 50%+。

### 6.1 AI 生成高频面试题

**Step 1：让 AI 根据你的简历生成面试题**

把简历 + 岗位 JD 扔给 Claude/GPT，用以下 prompt：

```
你是一位资深 AI 技术面试官。根据以下简历和岗位描述，生成 30 道高频面试题，覆盖：Python 基础、LLM 原理、RAG 架构、Agent 设计、系统设计、项目深挖、行为面试 7 个维度。每道题附简要参考答案要点。

[粘贴你的简历]
[粘贴目标岗位 JD]
```

**Step 2：分维度整理成题库**

| 维度 | 题量 | AI 生成方式 | 你重点做 |
|------|------|-------------|----------|
| **Python 基础** | 10 题 | 让 AI 生成"AI Agent 岗常考的 Python 题" | 过一遍，标记不会的 |
| **LLM 原理** | 15 题 | 让 AI 对比 GPT/Claude/DeepSeek 的架构差异 | 理解 Temperature/Top-P/Token 本质 |
| **RAG 架构** | 15 题 | 让 AI 生成"RAG 系统设计面试题" | 结合作品 1 的踩坑经验，准备真实案例 |
| **Agent 设计** | 20 题 | 让 AI 生成"多 Agent 系统设计题" | 结合作品 2 的架构回答 |
| **MCP/A2A 协议** | 10 题 | 让 AI 生成"MCP vs Function Calling vs A2A 对比题" | 这是 2026 年新热点，面试官爱问 |
| **系统设计** | 10 题 | 让 AI 生成"设计一个 XX Agent 系统" | 用作品 3 的架构图辅助回答 |
| **项目深挖** | 15 题 | 让 AI 根据你的 GitHub 仓库提问 | 每个作品准备 3 分钟"电梯演讲" |
| **行为面试** | 10 题 | 让 AI 生成"应届生常见行为面试题" | 准备 3 个 STAR 故事 |

### 6.2 AI 模拟面试

**方法 1：文字模拟（每天 15 分钟）**

```
你现在是 [目标公司] 的 AI 技术面试官。面试一个应届生，岗位是 AI Agent 开发工程师。请逐题向我提问，每次一问。我的回答后，请评价（得分 + 改进建议），然后出下一题。从"请做一个 1 分钟自我介绍"开始。
```

**方法 2：语音模拟（每周 2 次）**

用 Claude Code / ChatGPT Voice Mode 模拟真实面试场景：
- 打开语音模式
- 让 AI 扮演面试官连续提问 15-20 分钟
- 录音回听，找表达卡顿和技术表述不准确的地方

### 6.3 面试话术模板（AI 生成 + 你定制）

**项目介绍模板（STAR 法则）**

```

我最大的挑战是非科班背景，对计算机基础（OS/网络/编译原理）的系统性理解还不够深。但我用项目证明了快速学习和交付的能力——4 个月内独立交付了 4 个 AI Agent 应用。入职后我会用业余时间系统补齐基础。
```

## 8. Claude Code 执行手册

> **前提**：你已安装 Claude Code（VS Code / JetBrains 插件或 CLI），本手册假设你每个工作日打开 CC 作为默认 AI 搭档。CC 擅长生成、解释、Debug、重构——但永远不能替代你理解代码。

### 8.1 CC 使用铁律

| 铁律 | 含义 | 违反后果 |
|------|------|----------|
| **你能解释每一行** | CC 生成的代码，你必须能逐行讲出为什么这么写 | 面试被问住 = 直接挂 |
| **你先想，再让 CC 写** | 先花 5 分钟想清楚设计意图，再让 CC 生成代码 | 变成"AI 操作员"而非工程师 |
| **架构你定，代码 CC 写** | 目录结构、模块边界、数据流由你决策，CC 只负责填充 | 架构烂了，代码再漂亮也没用 |
| **CC 写的测试你审** | CC 生成的测试用例可能漏边界 case、mock 不对、断言太弱 | 虚假的安全感 |
| **别让 CC 替你读文档** | 精读官方文档是你的事，CC 只能辅助总结（且可能总结错） | 理解停留在二手信息 |

### 8.2 CC 最佳使用场景速查

| 场景 | 给 CC 的输入 | CC 产出 | 你做什么 |
|------|-------------|---------|----------|
| **生成项目骨架** | "我要一个 FastAPI 项目，含 config/llm/tools 三个模块，用 poetry 管理依赖" | 目录结构 + `__init__.py` + 基础类 | 审查模块划分是否合理，调整职责边界 |
| **写样板代码** | "写一个 Pydantic v2 的 ChatRequest/ChatResponse 模型，支持 streaming" | Model 定义 + 校验逻辑 | 确认字段名和类型符合你的 API 设计 |
| **Debug 复杂 Bug** | 贴完整 traceback + 相关代码片段 | 定位根因 + 修复方案 | 理解为什么出错，不只是复制粘贴修复 |
| **生成测试用例** | "给这个函数生成 20 个 pytest 用例，覆盖正常/边界/异常" | 测试代码 | 抽查 30%，补你认为漏掉的边界 case |
| **写文档/README** | "根据这个仓库的代码生成 README，包含安装/使用/API 文档" | README.md | 核对安装步骤是否真实可跑，API 参数是否准确 |
| **重构建议** | "这段代码有没有更好的写法？关注可读性和性能" | 重构 diff | 逐行理解改动，确认不引入新 bug |
| **生成 CI 配置** | "给我一个 GitHub Actions 配置，push 时 lint+test+build" | `.github/workflows/ci.yml` | 调整 Python 版本、依赖安装步骤、secret 变量 |
| **对比技术方案** | "对比 Milvus vs Qdrant 做 RAG 向量库的优劣" | 对比表格 | 验证数据是否过时，结合你的场景做最终决策 |

### 8.5 CC 禁区：这些事别让 CC 做

| 禁区 | 原因 | 正确做法 |
|------|------|----------|
| **选技术方案** | CC 会给你"政治正确"的答案，不会考虑你的学习成本和时间约束 | 自己调研 2-3 个方案，让 CC 列出优劣对比，你决策 |
| **写 System Prompt** | System Prompt 是 Agent 的灵魂，需要领域理解和反复实验 | 你自己设计角色/约束/格式，让 CC 帮你检查措辞歧义 |
| **设计数据库 Schema** | CC 不知道你的查询模式、数据量、未来扩展方向 | 你画 ER 图，让 CC 生成 SQL/ORM 代码 |
| **做性能优化决策** | CC 不知道你的瓶颈在哪、用户行为是什么、成本约束是什么 | 你先 profiling 定位瓶颈，让 CC 针对具体热点给优化方案 |
| **处理安全漏洞** | CC 可能漏掉隐蔽的攻击向量，给你虚假安全感 | 自己看 OWASP Top 10 for LLM，逐项检查，让 CC 生成测试用例 |
| **决定「够好了」** | CC 永远说"还可以更好"，不会帮你判断什么时候该停 | 你自己对照检验标准，达标就过，别过度打磨 |

| 占比 | 分配给 CC 的任务 | 示例 |
|------|-----------------|------|
| **~40%** | 生成样板/骨架/配置 | 前端组件、CI 配置、Dockerfile、测试用例 |
| **~30%** | Debug + 解释代码 | traceback 分析、源码解读、技术对比 |
| **~20%** | 写/润色文档 | README、技术文章、简历、面经 |
| **~10%** | 脑暴/方案对比 | "还有没有别的做法？"、"A vs B 的优劣？" |
| **0%** | 替你做决策 | 架构设计、技术选型、system prompt 设计 |

> **如果某天你写代码的时间 < 50%**（大部分时间在审 CC 的代码），说明你今天应该调高「亲手写」的比例。面试时你只能靠自己的手来解释代码。
</script>

<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><span class="dot"></span> AI Agent 养成计划</div>
    <div class="subtitle">16 Weeks · 4 Phases</div>
  </div>
  <div class="sidebar-progress">
    <div class="progress-label"><span>全局任务进度</span><span class="pct" id="globalPct">0%</span></div>
    <div class="progress-bar"><div class="fill" id="globalBar" style="width:0%"></div></div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <button onclick="toggleTheme()">明/暗</button>
    <button onclick="openSearch()">搜索</button>

  </div>
</aside>

<div class="search-overlay" id="searchOverlay" onclick="closeSearch(event)">
  <div class="search-box" onclick="event.stopPropagation()">
    <input type="text" id="searchInput" placeholder="搜索周次、技术栈、任务...（Esc 关闭）" oninput="doSearch()" onkeydown="searchKey(event)">
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div id="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <span style="font-family:var(--font-mono);font-size:0.85rem;color:var(--accent);font-weight:700;">16W</span>
    <span style="font-size:0.8rem;color:var(--text-dim);">Agent Engineer Plan</span>
    <span class="spacer"></span>
    <span class="stats">✅ <span id="doneCount">0</span> / <span id="totalCount">0</span></span>
    <button onclick="openSearch()">⌘K</button>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ── Read markdown from <script> tag (no escaping issues) ──
const MD = document.getElementById('md-content').textContent;

// ── Storage keys ──
const STORE_PROGRESS = 'aip16_progress';
const STORE_SCROLL   = 'aip16_scroll';
const STORE_THEME    = 'aip16_theme';

// ── Markdown → HTML parser ──
function parseMD(src) {
  let out = '';
  const lines = src.split('\n');
  let inTable = false, tableRows = [];
  let inCode = false, codeLines = [], codeLang = '';
  let inQuote = false, quoteLines = [];
  let inList = false, listType = '', listItems = [];

  function flushTable() {
    if (!tableRows.length) return;
    out += '<div class="table-wrap"><table>';
    const hdr = tableRows[0];
    out += '<thead><tr>';
    hdr.forEach(c => out += '<th>' + procInline(c.trim()) + '</th>');
    out += '</tr></thead><tbody>';
    for (let i = 1; i < tableRows.length; i++) {
      out += '<tr>';
      tableRows[i].forEach(c => out += '<td>' + procInline(c.trim()) + '</td>');
      out += '</tr>';
    }
    out += '</tbody></table></div>';
    tableRows = []; inTable = false;
  }

  function flushCode() {
    let esc = codeLines.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    out += '<pre><code>' + esc + '</code></pre>';
    codeLines = []; codeLang = ''; inCode = false;
  }

  function flushQuote() {
    out += '<blockquote>' + quoteLines.map(l => '<p>' + procInline(l) + '</p>').join('') + '</blockquote>';
    quoteLines = []; inQuote = false;
  }

  function flushList() {
    if (!listItems.length) return;
    let t = listType === 'ol' ? '<ol>' : '<ul>';
    listItems.forEach(item => t += '<li>' + procInline(item) + '</li>');
    t += listType === 'ol' ? '</ol>' : '</ul>';
    out += t;
    listItems = []; inList = false; listType = '';
  }

  function procInline(text) {
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
    return text;
  }

  function parseRow(line) {
    const cells = [];
    let cur = '', i = 1;
    while (i < line.length - 1) {
      if (line[i] === '|') { cells.push(cur); cur = ''; i++; continue; }
      cur += line[i]; i++;
    }
    cells.push(cur);
    return cells;
  }

  function isSep(row) { return /^\|[\s\-:|]+\|$/.test(row); }

  function flushAll() { flushList(); flushQuote(); flushTable(); flushCode(); }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i], t = line.trim();

    if (t.startsWith('```')) {
      if (inCode) { flushCode(); continue; }
      inCode = true; codeLang = t.slice(3).trim(); continue;
    }
    if (inCode) { codeLines.push(line); continue; }

    if (t.startsWith('>')) {
      if (!inQuote) inQuote = true;
      quoteLines.push(t.replace(/^>\s?/, '')); continue;
    }
    if (inQuote && t === '') { flushQuote(); continue; }
    if (inQuote && !t.startsWith('>')) { flushQuote(); }

    const isTbl = t.startsWith('|') && t.endsWith('|');
    if (isTbl && !inTable) { flushAll(); inTable = true; tableRows.push(parseRow(t)); continue; }
    if (isTbl && inTable) {
      if (isSep(t)) continue;
      tableRows.push(parseRow(t)); continue;
    }
    if (inTable && !isTbl) { flushTable(); }

    if (t === '') {
      if (inList && i + 1 < lines.length) {
        const nt = lines[i+1].trim();
        const isUl = /^[-*+]\s+/.test(nt);
        const isOl = /^\d+[.)]\s+/.test(nt);
        if (!isUl && !isOl) { flushList(); }
      } else if (inList) { flushList(); }
      continue;
    }

    const ulM = t.match(/^[-*+]\s+(.+)/);
    const olM = t.match(/^\d+[.)]\s+(.+)/);
    if (ulM) { if (!inList || listType !== 'ul') { flushList(); inList = true; listType = 'ul'; } listItems.push(ulM[1]); continue; }
    if (olM) { if (!inList || listType !== 'ol') { flushList(); inList = true; listType = 'ol'; } listItems.push(olM[1]); continue; }
    if (inList) { flushList(); }

    if (t.startsWith('#### ')) { flushAll(); out += '<h4 id="' + sid(t.slice(5)) + '">' + procInline(t.slice(5)) + '</h4>'; continue; }
    if (t.startsWith('### '))  { flushAll(); out += '<h3 id="' + sid(t.slice(4)) + '">' + procInline(t.slice(4)) + '</h3>'; continue; }
    if (t.startsWith('## '))   { flushAll(); out += '<h2 id="' + sid(t.slice(3)) + '">' + procInline(t.slice(3)) + '</h2>'; continue; }
    if (t.startsWith('# '))    { flushAll(); out += '<h1 id="' + sid(t.slice(2)) + '">' + procInline(t.slice(2)) + '</h1>'; continue; }

    if (/^[-*_]{3,}$/.test(t)) { flushAll(); out += '<hr>'; continue; }

    flushList(); flushQuote();
    out += '<p>' + procInline(t) + '</p>';
  }
  flushAll();
  return out;
}

function sid(text) {
  return text.toLowerCase().replace(/[^\w一-鿿]+/g, '-').replace(/^-|-$/g, '');
}

// ── Task checkboxes ──
let taskCheckboxes = [];
let weekHeadings = [];

function render() {
  const content = document.getElementById('content');
  let html = parseMD(MD);

  // Convert Day rows in tables into checkable items
  // Pattern: <td>Day N</td><td>task description</td><td>time</td>
  html = html.replace(/<td>Day (\d+)<\/td><td>(.+?)<\/td><td>(\d+h?)<\/td>/g,
    (m, day, desc, time) => {
      const id = 'wk-task-' + Math.random().toString(36).slice(2, 8);
      return '<td><label class="task-item" data-id="' + id + '"><span class="task-check">✔</span> Day ' + day + '</label></td><td><span class="task-text">' + desc + '</span></td><td>' + time + '</td>';
    });

  content.innerHTML = html;

  // Collect week headings for nav
  weekHeadings = [];
  content.querySelectorAll('h4').forEach(h4 => {
    const text = h4.textContent;
    const m = text.match(/Week\s+(\d+)/i);
    if (m) weekHeadings.push({ id: h4.id, num: parseInt(m[1]), title: text, el: h4 });
  });

  // Attach click handlers
  taskCheckboxes = [];
  content.querySelectorAll('.task-item').forEach(item => {
    const id = item.dataset.id;
    taskCheckboxes.push(id);
    if (isDone(id)) item.classList.add('done');
    item.addEventListener('click', () => toggleTask(id, item));
  });

  buildSidebar();
  updateStats();
  restoreScroll();
}

// ── Progress ──
function load() { try { return JSON.parse(localStorage.getItem(STORE_PROGRESS)) || {}; } catch { return {}; } }
function save(d) { localStorage.setItem(STORE_PROGRESS, JSON.stringify(d)); }
function isDone(id) { return load()[id] === true; }

function toggleTask(id, el) {
  const d = load();
  if (d[id]) { delete d[id]; el.classList.remove('done'); }
  else { d[id] = true; el.classList.add('done'); }
  save(d);
  updateStats();
}

function resetProgress() {
  if (confirm('确定要重置所有任务进度吗？此操作不可撤销。')) {
    localStorage.removeItem(STORE_PROGRESS);
    render();
  }
}

function updateStats() {
  const d = load();
  const done = Object.values(d).filter(v => v === true).length;
  const total = taskCheckboxes.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('globalPct').textContent = pct + '%';
  document.getElementById('globalBar').style.width = pct + '%';
}

// ── Sidebar ──
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const phases = [
    { name: '阶段一：基础夯实', weeks: [1,2,3,4] },
    { name: '阶段二：深度构建', weeks: [5,6,7,8] },
    { name: '阶段三：工程化', weeks: [9,10,11,12] },
    { name: '阶段四：企业级冲刺', weeks: [13,14,15,16] },
  ];
  let h = '';
  phases.forEach((p, pi) => {
    h += '<div class="nav-phase' + (pi > 0 ? ' collapsed' : '') + '" onclick="togglePhase(this)"><span class="arrow">▼</span>' + p.name + '</div>';
    h += '<div class="nav-weeks' + (pi > 0 ? ' collapsed' : '') + '" style="max-height:' + (p.weeks.length * 42) + 'px">';
    p.weeks.forEach(w => {
      const wh = weekHeadings.find(x => x.num === w);
      const title = wh ? wh.title.replace(/^Week \d+：/, '') : 'Week ' + w;
      h += '<a class="nav-week" data-week="' + w + '" href="#' + (wh ? wh.id : '') + '" onclick="goWeek(event,' + w + ',\'' + (wh ? wh.id : '') + '\')"><span class="wk-num">W' + w + '</span><span class="check-dot"></span><span class="wk-title">' + title + '</span></a>';
    });
    h += '</div>';
  });
  h += '<div style="padding:0.6rem 1.2rem;border-top:1px solid var(--border);margin-top:0.5rem">';
  h += '<a class="nav-week" href="#3-证书穿插计划" onclick="jump(event)"><span class="wk-num">📜</span>证书计划</a>';
  h += '<a class="nav-week" href="#4-作品集规划" onclick="jump(event)"><span class="wk-num">📦</span>作品集</a>';
	  h += '<a class="nav-week" href="#github-profile-包装指南" onclick="jump(event)"><span class="wk-num">🐙</span>GitHub 包装</a>';
  h += '<a class="nav-week" href="#5-求职时间轴" onclick="jump(event)"><span class="wk-num">🎯</span>求职时间轴</a>';
  h += '<a class="nav-week" href="#6-面试准备模块-用-ai-生成面经--模拟面试" onclick="jump(event)"><span class="wk-num">🎤</span>面试准备</a>';
	  h += '<a class="nav-week" href="#7-资源清单" onclick="jump(event)"><span class="wk-num">📚</span>资源清单</a>';
	  h += '<a class="nav-week" href="#8-claude-code-执行手册" onclick="jump(event)"><span class="wk-num">🤖</span>CC 执行手册</a>';
  h += '</div>';
  nav.innerHTML = h;
}

function togglePhase(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('collapsed');
}

function goWeek(e, wk, id) {
  e.preventDefault();
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.nav-week').forEach(a => a.classList.remove('active'));
  e.target.closest('.nav-week')?.classList.add('active');
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

function jump(e) {
  e.preventDefault();
  const href = e.target.closest('a')?.getAttribute('href');
  if (href) {
    const el = document.getElementById(href.slice(1));
    if (el) el.scrollIntoView({ behavior: 'smooth' });
    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
  }
}

// ── Scroll ──
let scrollTimer;
window.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    localStorage.setItem(STORE_SCROLL, window.scrollY);
    updateActiveNav();
  }, 150);
});

function restoreScroll() {
  const y = parseInt(localStorage.getItem(STORE_SCROLL));
  if (y) setTimeout(() => window.scrollTo(0, y), 150);
}

function updateActiveNav() {
  const h4s = document.querySelectorAll('h4[id]');
  let cur = null;
  h4s.forEach(h => { if (h.getBoundingClientRect().top < 150) cur = h.id; });
  if (cur) {
    document.querySelectorAll('.nav-week').forEach(a => a.classList.remove('active'));
    const link = document.querySelector('.nav-week[href="#' + cur + '"]');
    if (link) link.classList.add('active');
  }
}

// ── Search ──
function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  setTimeout(() => document.getElementById('searchInput').focus(), 100);
}

function closeSearch(e) {
  if (e && e.target !== document.getElementById('searchOverlay')) return;
  document.getElementById('searchOverlay').classList.remove('open');
}

function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const container = document.getElementById('searchResults');
  if (!q) { container.innerHTML = ''; return; }
  const blocks = [];
  document.getElementById('content').querySelectorAll('h1,h2,h3,h4,p,li,td,th').forEach(el => {
    blocks.push({ el, text: el.textContent.toLowerCase() });
  });
  const results = [];
  blocks.forEach(b => {
    const idx = b.text.indexOf(q);
    if (idx >= 0) {
      let ctx = b.text.substring(Math.max(0, idx - 25), idx + q.length + 45);
      if (idx > 25) ctx = '...' + ctx;
      if (idx + q.length + 45 < b.text.length) ctx += '...';
      const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      const hl = ctx.replace(re, m => '<span class="match">' + m + '</span>');
      results.push({ el: b.el, hl, tag: b.el.tagName });
    }
  });
  if (!results.length) { container.innerHTML = '<div class="no-results">没有找到匹配内容</div>'; return; }
  container.innerHTML = results.slice(0, 20).map((r, i) =>
    '<div class="search-result" data-idx="' + i + '" onclick="goResult(this)"><div>' + r.hl + '</div><div class="ctx">' + r.tag + '</div></div>'
  ).join('');
  container._results = results;
}

function searchKey(e) {
  if (e.key === 'Escape') closeSearch();
  if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); }
  if (e.key === 'Enter') { const f = document.querySelector('.search-result.focused'); if (f) goResult(f); }
}

function moveFocus(dir) {
  const items = document.querySelectorAll('.search-result');
  if (!items.length) return;
  const cur = document.querySelector('.search-result.focused');
  let idx = cur ? parseInt(cur.dataset.idx) + dir : 0;
  if (idx < 0) idx = items.length - 1;
  if (idx >= items.length) idx = 0;
  items.forEach(i => i.classList.remove('focused'));
  items[idx].classList.add('focused');
  items[idx].scrollIntoView({ block: 'nearest' });
}

function goResult(el) {
  const idx = parseInt(el.dataset.idx);
  const results = document.getElementById('searchResults')._results;
  if (results && results[idx]) { closeSearch(); results[idx].el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
}

// ── Theme ──
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem(STORE_THEME, document.body.classList.contains('light') ? 'light' : 'dark');
}

// ── Mobile sidebar ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') { closeSearch(); document.getElementById('sidebar').classList.remove('open'); }
});

// ── Init ──
if (localStorage.getItem(STORE_THEME) === 'light') document.body.classList.add('light');
render();
</script>
